name: Deploy to Shopify Oxygen

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Build and Deploy to Oxygen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: storefront

      - name: Build Hydrogen storefront
        run: pnpm build
        working-directory: storefront
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.PUBLIC_STORE_DOMAIN }}
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.PUBLIC_STOREFRONT_API_TOKEN }}
          SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KLAVIYO_PRIVATE_API_KEY: ${{ secrets.KLAVIYO_PRIVATE_API_KEY }}
          KLAVIYO_PUBLIC_API_KEY: ${{ secrets.KLAVIYO_PUBLIC_API_KEY }}
          VENDOR_EMAIL: ${{ secrets.VENDOR_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
          COACHING_TIER1_VARIANT_ID: ${{ secrets.COACHING_TIER1_VARIANT_ID }}
          COACHING_TIER2_VARIANT_ID: ${{ secrets.COACHING_TIER2_VARIANT_ID }}
          COACHING_TIER3_VARIANT_ID: ${{ secrets.COACHING_TIER3_VARIANT_ID }}

      - name: Deploy to Oxygen
        id: deploy
        uses: shopify/hydrogen-action@v1
        with:
          path: storefront
          token: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN }}
          metadata:
            description: Axiom Metabolic — ${{ github.event.head_commit.message || 'PR Preview' }}
            url: ${{ github.event.head_commit.url || github.event.pull_request.html_url }}
            user: ${{ github.event.head_commit.author.name || github.actor }}
            commit: ${{ github.sha }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.url }}';
            if (previewUrl) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Axiom Metabolic Preview Deployment**\n\nYour changes are live at: ${previewUrl}`
              });
            }
