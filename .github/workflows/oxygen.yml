name: Deploy to Shopify Oxygen

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Build and Deploy to Oxygen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: storefront

      - name: Build and Deploy to Oxygen
        run: npx shopify hydrogen deploy --token $SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN
        working-directory: storefront
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.PUBLIC_STORE_DOMAIN }}
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.PUBLIC_STOREFRONT_API_TOKEN }}
          SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KLAVIYO_PRIVATE_API_KEY: ${{ secrets.KLAVIYO_PRIVATE_API_KEY }}
          KLAVIYO_PUBLIC_API_KEY: ${{ secrets.KLAVIYO_PUBLIC_API_KEY }}
          VENDOR_EMAIL: ${{ secrets.VENDOR_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
          COACHING_TIER1_VARIANT_ID: ${{ secrets.COACHING_TIER1_VARIANT_ID }}
          COACHING_TIER2_VARIANT_ID: ${{ secrets.COACHING_TIER2_VARIANT_ID }}
          COACHING_TIER3_VARIANT_ID: ${{ secrets.COACHING_TIER3_VARIANT_ID }}
          ZAPIER_WEBHOOK_SECRET: ${{ secrets.ZAPIER_WEBHOOK_SECRET }}
